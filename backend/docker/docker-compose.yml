services:
  # NestJS Application
  nestjs:
    build:
      context: ..
      dockerfile: docker/nestjs-rag-system/Dockerfile
    container_name: nestjs
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '5000:5000'
    volumes:
      - nestjs_data:/app/assets
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./env/.env.app

  # Nginx
  nginx:
    image: nginx:stable-alpine3.23-perl
    container_name: nginx
    ports:
      - '80:80'
    volumes:
      - './nginx/default.conf:/etc/nginx/conf.d/default.conf'
    depends_on:
      - nestjs
    networks:
      - backend
    restart: unless-stopped

  # MySQL
  mysql:
    image: mysql:8.0.45-debian
    container_name: mysql
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - ./env/.env.mysql
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Qdrant
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    ports:
      - '9090:9090'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  # Grafana
  grafana:
    image: grafana/grafana:12.3-ubuntu
    container_name: grafana
    ports:
      - '4000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
    env_file:
      - ./env/.env.grafana
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped

  # Node Exporter
  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - backend
    restart: unless-stopped

  # MySQL Exporter
  mysql-exporter:
    image: prom/mysqld-exporter:latest
    container_name: mysql_exporter
    ports:
      - '9104:9104'
    command:
      - '--mysqld.address=mysql:3306'
      - '--mysqld.username=root'
    environment:
      - MYSQLD_EXPORTER_PASSWORD=mysql_root_password
    depends_on:
      - mysql
    networks:
      - backend
    restart: unless-stopped

  # Redis (Results Backend & Cache)
  redis:
    image: redis:8.0.6-alpine
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    env_file:
      - ./env/.env.redis
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 10s
      retries: 5
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--requirepass',
        '${REDIS_PASSWORD:-minirag_redis_2222}',
      ]

networks:
  backend:
    driver: bridge

volumes:
  nestjs_data:
  mysql_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  redis_data:
