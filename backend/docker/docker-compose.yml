services:
  mysql:
    image: mysql:8.0.45-debian
    container_name: mysql-rag-system
    ports:
      - '${DB_PORT}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:

volumes:
  mysql_data:
